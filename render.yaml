# Render Blueprint — 백엔드 웹 서비스
# 대시보드에서 New > Blueprint 로 이 파일을 읽거나, 수동 Web Service 로 동일하게 설정.
services:
  - type: web
    name: localhub-backend
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    # 무료 플랜 파일시스템은 휘발성 → 기동 시마다 시드(멱등, INSERT OR IGNORE) 후 서버 실행
    startCommand: python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      # OPENAI_API_KEY 는 sync:false → 대시보드에서 직접 입력 (저장소/코드에 절대 커밋 금지)
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_TIMEOUT
        value: "20"
      # Netlify 배포 도메인 포함해서 대시보드에서 설정
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.8"
